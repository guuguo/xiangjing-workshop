name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - platform: windows-latest
            rust_target: ""
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('manual-{0}', github.run_number) }}
          releaseName: 像境工坊 ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('manual-{0}', github.run_number) }}
          releaseBody: |
            自动构建的桌面安装包。

            注意：当前工作流未配置 Apple Developer ID 公证或 Windows 代码签名证书，下载后可能需要按系统提示手动允许运行。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  rename-assets:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Rename release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
            --jq '.assets[] | [.url, .name] | @tsv' |
          while IFS=$'\t' read -r api_url name; do
            id="${api_url##*/}"
            case "$name" in
              "_${version}_aarch64.dmg")
                new_name="像境工坊_${version}_aarch64.dmg"
                ;;
              "_${version}_x64.dmg")
                new_name="像境工坊_${version}_x64.dmg"
                ;;
              "_${version}_x64-setup.exe")
                new_name="像境工坊_${version}_x64-setup.exe"
                ;;
              *)
                continue
                ;;
            esac
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/assets/${id}" -f name="${new_name}" >/dev/null
          done
